name: Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to update (example: v1.1.0)"
        required: true
        default: "v1.1.0"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            is_linux: true
            produced_name: stegoforge
            asset_name: stegoforge-linux-x86_64
          - os: windows-latest
            is_linux: false
            produced_name: stegoforge.exe
            asset_name: stegoforge-windows-x86_64.exe
          - os: macos-14
            is_linux: false
            produced_name: stegoforge
            asset_name: stegoforge-macos-arm64

    container: ${{ matrix.is_linux && 'python:3.10-slim-bullseye' || null }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Python
        if: ${{ !matrix.is_linux }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Verify tag/version alignment
        shell: bash
        run: |
          EXPECTED_TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          EXPECTED_VERSION="${EXPECTED_TAG#v}"
          CODE_VERSION="$(python -c 'from core.version import __version__; print(__version__)')"

          echo "Release tag: ${EXPECTED_TAG}"
          echo "Code version: ${CODE_VERSION}"

          if [ "${EXPECTED_VERSION}" != "${CODE_VERSION}" ]; then
            echo "Tag/version mismatch: expected ${EXPECTED_VERSION}, found ${CODE_VERSION}"
            exit 1
          fi

      - name: Install system deps (Linux)
        if: ${{ matrix.is_linux }}
        run: |
          apt-get update
          apt-get install -y binutils

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller setuptools wheel
          pip install -r requirements.txt
          pip install -r requirements-web.txt

      - name: Build binary
        run: pyinstaller stegoforge.spec --clean -y

      - name: Quick web import smoke test
        run: python -c "from web.app import create_app; create_app()"

      - name: Prepare artifact
        shell: bash
        run: |
          mv "dist/${{ matrix.produced_name }}" "dist/${{ matrix.asset_name }}"
          if [ "$RUNNER_OS" != "Windows" ]; then
            chmod +x "dist/${{ matrix.asset_name }}"
          fi
          ls -lh "dist/${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Update release assets
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Validate artifacts
        run: |
          ls -lh release-assets
          test -f release-assets/stegoforge-linux-x86_64
          test -f release-assets/stegoforge-windows-x86_64.exe
          test -f release-assets/stegoforge-macos-arm64

      - name: Publish assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          files: |
            release-assets/stegoforge-linux-x86_64
            release-assets/stegoforge-windows-x86_64.exe
            release-assets/stegoforge-macos-arm64
          overwrite_files: true
          fail_on_unmatched_files: true
          generate_release_notes: false
